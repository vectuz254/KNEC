<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="bg-glow"></div>

  <main class="wrap">

    <header class="header">
      <h1>Submit Your Entry</h1>
      <p class="sub">Fill in your details before the deadline closes.</p>
    </header>

    <!-- Countdown -->
    <section class="timer-card" id="timerCard">
      <p class="timer-label">Time remaining</p>
      <div class="timer" id="timer">
        <div class="unit"><span id="days">00</span><small>Days</small></div>
        <div class="unit"><span id="hours">00</span><small>Hours</small></div>
        <div class="unit"><span id="minutes">00</span><small>Mins</small></div>
        <div class="unit"><span id="seconds">00</span><small>Secs</small></div>
      </div>
      <p class="deadline-text" id="deadlineText"></p>
    </section>

    <!-- Photo slider (showcase images of your choice) -->
    <section class="slider-card">
      <div class="slider" id="slider">
        <div class="slider-track" id="sliderTrack">
          <div class="slide placeholder">
            <span>Add photos in script.js<br>(SHOWCASE_IMAGES array)</span>
          </div>
        </div>
      </div>
      <div class="slider-dots" id="sliderDots"></div>
    </section>

    <!-- Form -->
    <form id="submitForm" class="form-card">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Jane Wanjiru" required>
      </div>

      <div class="field">
        <label for="index">Index Number</label>
        <input type="text" id="index" name="index" placeholder="e.g. 2024/CS/0123" required>
      </div>

      <div class="field">
        <label for="institution">Institution</label>
        <select id="institution" name="institution" required>
          <option value="" disabled selected>Select your institution</option>
        </select>
      </div>

      <div class="field">
        <label for="year">Year Completed</label>
        <select id="year" name="year" required>
          <option value="" disabled selected>Select year</option>
        </select>
      </div>

      <div class="field">
        <label for="reason">Reason for Submitting</label>
        <textarea id="reason" name="reason" rows="4" placeholder="Tell us why..." required></textarea>
      </div>

      <div class="field">
        <label for="photos">Upload Photo(s)</label>
        <input type="file" id="photos" name="photos" accept="image/*" multiple>
        <div class="upload-preview" id="uploadPreview"></div>
      </div>

      <div class="payment-box" id="paymentBox">
        <p class="payment-title">Payment Details,BUSINESS NUMBER 329329 AC NO 0100423503300</p>
        <p class="payment-line" id="paymentLine">Loading payment info...</p>
        <div class="field">
          <label for="paymentMsg">Paste M-Pesa Confirmation Message</label>
          <textarea id="paymentMsg" name="paymentMsg" rows="3" placeholder="Paste the full SMS you received after paying" required></textarea>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Submit Entry</button>
      <p class="form-msg" id="formMsg"></p>
    </form>

    <!-- Submissions list (visible to you, the admin, on this device) -->
    <section class="admin-card">
      <div class="admin-head">
        <h2>Submissions <span id="countBadge">(0)</span></h2>
        <div class="admin-btns">
          <button id="refreshBtn" class="btn-ghost">Refresh</button>
          <button id="clearBtn" class="btn-ghost btn-danger">Clear All</button>
        </div>
      </div>
      <div id="submissionsList" class="submissions-list">
        <p class="empty-note">Loading submissions...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
